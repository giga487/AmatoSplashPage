name: Deploy Blazor App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permessi corretti per il metodo di deploy moderno
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x # Usa la versione del tuo progetto

      - name: Install WebAssembly Tools Workload
        run: dotnet workload install wasm-tools

      # 1. Pubblica il progetto
      - name: Publish .NET Project
        run: dotnet publish AmatoFluent/AmatoFluent.csproj -c Release -o public

      # 2. Configura l'ambiente per GitHub Pages (NoJekyll, Base Href, 404)
      - name: Setup GitHub Pages Environment
        run: |
          touch public/wwwroot/.nojekyll
          sed -i 's/<base href="\/" \/>/<base href="\/AmatoSplashPage\/" \/>/g' public/wwwroot/index.html
          cp public/wwwroot/index.html public/wwwroot/404.html

      # 3. Carica i file del sito come "artefatto"
      #    Questo è il passaggio che ti permetterà di vedere l'artefatto nella UI
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/wwwroot

      # 4. Esegue il deploy dell'artefatto sui server di GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
